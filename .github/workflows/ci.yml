name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  commitlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install commitlint
        run: npm install

      - name: Validate commits
        run: npx commitlint --from ${{ github.event.pull_request.base.sha || 'HEAD~1' }} --to HEAD

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format clang-tidy cppcheck

      - name: Check formatting
        run: |
          find main components -name '*.c' -o -name '*.h' | \
            xargs clang-format --dry-run --Werror

      - name: Run cppcheck
        run: |
          cppcheck --error-exitcode=1 --suppressions-list=.cppcheck \
            --enable=warning,style,performance,portability \
            -I main/include \
            -I components/*/include \
            main/ components/

  build:
    runs-on: ubuntu-latest
    container: espressif/idf:v5.2
    steps:
      - uses: actions/checkout@v4

      - name: Build project
        run: |
          . $IDF_PATH/export.sh
          idf.py set-target esp32
          idf.py build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: |
            build/*.bin
            build/*.elf
            build/bootloader/*.bin
            build/partition_table/*.bin

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build and run host tests
        run: |
          cd test/host
          mkdir -p build && cd build
          cmake ..
          make -j$(nproc)
          ./robot_test
